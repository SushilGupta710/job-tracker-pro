<div class="min-h-screen bg-slate-950 font-sans flex flex-col justify-center items-center px-3 py-3">
  @if (toastMessage()) {
    <app-tost-notification
      [toastMessage]="toastMessage()"
      (close)="closeToast()"
      [toastType]="toastType()"
    />  }

  <div
    class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-2xl overflow-hidden transition-all"
  >
    <div class="text-center py-4 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
      <a href="#" class="flex items-center justify-center mb-2 text-2xl font-semibold text-slate-900 dark:text-white">
        <img
          class="w-10 h-10 mr-2"
          src="/assets/main-logo.png"
          alt="Apply Flow logo"
        />
        Apply with flow
      </a>
    </div>

<div
  class="grid grid-cols-2 text-center text-sm font-semibold border-b border-slate-200 dark:border-slate-700"
  *ngIf="mode !== 'forgot'"
>
  <button
    type="button"
    (click)="setMode('login')"
    class="py-4 border-b-2 transition-all"
    [ngClass]="
      mode === 'login'
        ? 'border-indigo-600 text-indigo-600 bg-indigo-50 dark:bg-slate-800 dark:text-indigo-400'
        : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'
    "
  >
    Login
  </button>

  <button
    type="button"
    (click)="setMode('signup')"
    class="py-4 border-b-2 transition-all"
    [ngClass]="
      mode === 'signup'
        ? 'border-indigo-600 text-indigo-600 bg-indigo-50 dark:bg-slate-800 dark:text-indigo-400'
        : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'
    "
  >
    Sign Up
  </button>
</div>

    <div class="px-6 py-5">
      <button
        *ngIf="mode !== 'forgot'"
        (click)="continueWithGoogle()"
        class="w-full border border-slate-300 dark:border-slate-700 rounded-xl py-2.5 flex items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-900"
      >
        <img src="https://www.google.com/favicon.ico" class="w-4 h-4" alt="G" />
        Continue with Google
      </button>

      <div
        *ngIf="mode !== 'forgot'"
        class="flex items-center my-4 gap-2 text-slate-400 text-[10px] font-bold tracking-widest"
      >
        <span class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></span> OR
        <span class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></span>
      </div>

      <div *ngIf="mode === 'forgot'" class="space-y-4" [formGroup]="forgotForm">
        <h3 class="font-bold text-slate-800 dark:text-white">Reset Password</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400">Enter your email and we'll send you a recovery link.</p>

        <input
          type="email"
          formControlName="email"
          class="w-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl py-2.5 px-4 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder:text-slate-400"
          placeholder="your@email.com"
        />

        <button
          (click)="onForgotPassword()"
          [disabled]="isLoading()"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/20 disabled:bg-slate-400"
        >
          {{ isLoading() ? 'Sending...' : 'Send Link' }}
        </button>

        <button (click)="setMode('login')" class="w-full text-slate-500 dark:text-slate-400 text-sm hover:underline">
          Back to Login
        </button>
      </div>

      <form
        *ngIf="mode !== 'forgot'"
        [formGroup]="mode === 'login' ? loginForm : signupForm"
        (ngSubmit)="mode === 'login' ? onLogin() : onSignup()"
        class="space-y-3"
      >
        <div *ngIf="mode === 'signup'">
          <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">
            Full Name
          </label>
          <input
            type="text"
            formControlName="name"
            class="w-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl py-2.5 px-4 text-sm mt-1 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder:text-slate-400"
            placeholder="John Doe"
          />
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">
            Email Address
          </label>
          <input
            type="email"
            formControlName="email"
            class="w-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl py-2.5 px-4 text-sm mt-1 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder:text-slate-400"
            placeholder="name@company.com"
          />
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">
            Password
          </label>
          <input
            type="password"
            formControlName="password"
            class="w-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl py-2.5 px-4 text-sm mt-1 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder:text-slate-400"
            placeholder="••••••••"
          />
          <div *ngIf="mode === 'login'" class="text-right mt-1">
            <span
              (click)="setMode('forgot')"
              class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline cursor-pointer"
            >
              Forgot password?
            </span>
          </div>
        </div>

        <div
          *ngIf="showOtpInput()"

          </label>
          <input

          <button

            Verify & Login
          </button>

        <div *ngIf="mode === 'signup'">
          <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">
            Confirm Password
          </label>
          <input
            type="password"
            formControlName="confirmPassword"
            class="w-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl py-2.5 px-4 text-sm mt-1 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder:text-slate-400"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-3 rounded-xl text-white font-bold transition bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-500/20 disabled:bg-slate-400"
        >
          {{ isLoading() ? 'Processing...' : mode === 'login' ? 'Login' : 'Create Account' }}
        </button>

        <!-- <div *ngIf="mode === 'login' && !showOtpInput()" class="text-center">
          <button
            type="button"
            (click)="sendOtp()"
            class="text-slate-500 dark:text-slate-400 text-xs hover:text-indigo-600 dark:hover:text-indigo-400 transition"
          >
            Login with OTP instead
          </button>
        </div> -->
      </form>
    </div>

    <div class="px-6 pb-5 text-center">
      <p class="text-xs text-slate-400 dark:text-slate-500">
        By continuing, you agree to our
        <span class="text-indigo-500 cursor-pointer">Terms of Service</span>
      </p>
    </div>
  </div>
</div>
