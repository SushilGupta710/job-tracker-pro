<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center px-4 py-8">
  
<div *ngIf="errorMessage" class="fixed top-10 left-1/2 -translate-x-1/2 z-[100] animate-bounce">
  <div class="bg-red-600 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-red-500">
    <span class="font-bold text-lg">⚠️</span>
    <span class="font-medium">{{ errorMessage }}</span>
  </div>
</div>

  <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden transition-all">
    <div class="text-center px-8 py-6 border-b border-slate-200 bg-white">
  <div class="mx-auto w-16 h-16 rounded-full overflow-hidden mb-3 shadow-lg border-2 border-blue-100">
    <img src="./src/assets/applyflow-logo.png" alt="JS Logo" class="w-full h-full object-cover">
  </div>
  <h2 class="text-slate-800 font-bold text-xl">Job Seeker Portal</h2>
</div>

    <div class="grid grid-cols-2 text-center text-sm font-semibold border-b border-slate-100" *ngIf="mode !== 'forgot'">
      <button (click)="setMode('login')" [class.text-blue-600]="mode==='login'" [class.border-blue-600]="mode==='login'" class="py-4 border-b-2 border-transparent transition-all hover:bg-slate-50">Login</button>
      <button (click)="setMode('signup')" [class.text-blue-600]="mode==='signup'" [class.border-blue-600]="mode==='signup'" class="py-4 border-b-2 border-transparent transition-all hover:bg-slate-50">Sign Up</button>
    </div>

    <div class="px-5 py-3">
      <button *ngIf="mode !== 'forgot'" (click)="continueWithGoogle()" class="w-full border border-slate-300 rounded-xl py-2.5 flex items-center justify-center gap-2 hover:bg-slate-50 transition font-medium text-slate-700">
        <img src="https://www.google.com/favicon.ico" class="w-4 h-4" alt="G">
        Continue with Google
      </button>

      <div *ngIf="mode !== 'forgot'" class="flex items-center my-6 gap-3 text-slate-400 text-[10px] font-bold tracking-widest">
        <span class="h-px flex-1 bg-slate-100"></span> OR <span class="h-px flex-1 bg-slate-100"></span>
      </div>

<div *ngIf="mode === 'forgot'" class="space-y-4" [formGroup]="forgotForm">
  <h3 class="font-bold text-slate-800">Reset Password</h3>
  <p class="text-xs text-slate-500">Enter your email and we'll send you a recovery link.</p>
  
  <input type="email" 
         formControlName="email" 
         class="w-full border rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
         placeholder="your@email.com">
         
  <button (click)="onForgotPassword()" 
          [disabled]="isLoading"
          class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700 transition">
    {{ isLoading ? 'Sending...' : 'Send Link' }}
  </button>
  <button (click)="setMode('login')" class="w-full text-slate-500 text-sm hover:underline">Back to Login</button>
</div>

      <form *ngIf="mode !== 'forgot'" [formGroup]="mode==='login' ? loginForm : signupForm" (ngSubmit)="mode==='login' ? onLogin() : onSignup()" class="space-y-4">
        
        <div *ngIf="mode==='signup'">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Full Name</label>
          <input type="text" formControlName="name" class="w-full border border-slate-200 rounded-xl py-2.5 px-4 text-sm mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="John Doe" />
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
          <input type="email" formControlName="email" class="w-full border border-slate-200 rounded-xl py-2.5 px-4 text-sm mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="name@company.com" />
        </div>

        <div *ngIf="!showOtpInput">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Password</label>
          <input type="password" formControlName="password" class="w-full border border-slate-200 rounded-xl py-2.5 px-4 text-sm mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" />
          <div *ngIf="mode==='login'" class="text-right mt-1">
            <span (click)="setMode('forgot')" class="text-xs text-blue-600 hover:underline cursor-pointer">Forgot password?</span>
          </div>
        </div>

        <div *ngIf="showOtpInput" class="bg-blue-50 p-4 rounded-xl border border-blue-100 animate-pulse">
          <label class="text-xs font-bold text-blue-600 uppercase tracking-wider">Enter 6-Digit OTP</label>
          <input formControlName="otp" type="text" maxlength="6" class="w-full border-2 border-blue-200 rounded-xl py-3 px-4 text-center text-xl font-bold tracking-widest mt-1 focus:border-blue-500 outline-none" />
          <button type="button" (click)="onVerifyOtp()" class="w-full bg-blue-600 text-white py-2 rounded-lg mt-3 font-bold">Verify & Login</button>
        </div>

        <div *ngIf="mode==='signup'">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" class="w-full border border-slate-200 rounded-xl py-2.5 px-4 text-sm mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>
        <button *ngIf="!showOtpInput" type="submit" [disabled]="isLoading" class="w-full py-3 rounded-xl text-white font-bold transition bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-100 disabled:bg-slate-300">
          {{ isLoading ? 'Processing...' : (mode === 'login' ? 'Login' : 'Create Account') }}
        </button>

        <div *ngIf="mode === 'login' && !showOtpInput" class="text-center">
          <button type="button" (click)="sendOtp()" class="text-slate-500 text-xs hover:text-blue-600 transition">Login with OTP instead</button>
        </div>
      </form>
    </div>

    <div class="px-8 pb-8 text-center">
        <p class="text-xs text-slate-400">By continuing, you agree to our <span class="text-blue-500 cursor-pointer">Terms of Service</span></p>
    </div>
  </div>
</div>
