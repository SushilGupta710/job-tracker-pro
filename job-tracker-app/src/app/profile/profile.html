<app-nav-bar></app-nav-bar>
<div class="pt-20 p-6 dark:bg-slate-950 min-h-screen transition-all duration-300">
  <div class="max-w-3xl mx-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Profile</h1>
    <p class="mt-2 text-slate-600 dark:text-slate-400">Update your name information below. Email is read-only.</p>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="mt-6 space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">First Name</label>
        <input
          type="text"
          formControlName="firstName"
          class="w-full border border-slate-300 dark:border-slate-700 rounded-2xl px-4 py-3 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Last Name</label>
        <input
          type="text"
          formControlName="lastName"
          class="w-full border border-slate-300 dark:border-slate-700 rounded-2xl px-4 py-3 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Email</label>
        <input
          type="email"
          formControlName="email"
          readonly
          class="w-full border border-slate-300 dark:border-slate-700 rounded-2xl px-4 py-3 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full inline-flex items-center justify-center rounded-2xl bg-indigo-600 text-white py-3 font-semibold hover:bg-indigo-700 transition"
      >
        Update Profile
      </button>

      <p *ngIf="isSaved" class="text-sm text-emerald-600 dark:text-emerald-400">Profile updated successfully!</p>
    </form>
  </div>
</div>
