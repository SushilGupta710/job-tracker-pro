  class="bg-white dark:bg-slate-950 fixed w-full z-20 top-0 left-0 border-b border-slate-200 dark:border-slate-800"
>
  <div class="mx-auto flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-4">
      <p
        class="flex items-center gap-2 text-slate-900 dark:text-white"
      >
        <img class="h-10" src="/assets/main-logo.png" alt="Apply with flow logo" />
        <span class="self-center text-xl font-semibold whitespace-nowrap">Apply with flow</span>
    </p>

      <button
        type="button"
        class="hidden md:block py-2 px-3 text-slate-900 dark:text-white rounded hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        [ngClass]="{ 'bg-indigo-100 dark:bg-slate-800': currentNav() === 'dashboard' }"
        (click)="onNavClick('dashboard')"
      >
        Home
      </button>

      <button
        type="button"
        class="hidden md:block py-2 px-3 text-slate-900 dark:text-white rounded hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        [ngClass]="{ 'bg-indigo-100 dark:bg-slate-800': currentNav() === 'job-tracker' }"
        (click)="onNavClick('job-tracker')"
      >
        Job Tracker
      </button>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden sm:flex flex-col text-right">
        <span class="block text-sm font-medium text-slate-900 dark:text-white">{{ user()?.first_name || 'User' }}</span>
        <span class="block text-xs text-slate-500 dark:text-slate-400 truncate"
          >{{ user()?.email || 'user@example.com' }}</span
        >
      </div>

      <div class="relative">
        <button
          type="button"
          (click)="toggleDropdown()"
          class="flex items-center gap-2 rounded-full bg-slate-100 dark:bg-slate-800 p-2 hover:bg-slate-200 dark:hover:bg-slate-700 transition"
        >
          <span class="sr-only">Open user menu</span>
          <img class="w-6 h-6 rounded-full" src="/assets/logo.svg" alt="User photo" />
        </button>

        <div
          *ngIf="isDropdownOpen"
          class="absolute right-0 mt-2 w-44 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg z-50"
        >
          <ul class="py-2 text-sm text-slate-700 dark:text-slate-300">
            <li>
              <button
                type="button"
                (click)="viewProfile()"
                class="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md"
              >
                Profile
              </button>
            </li>
            <li>
              <button
                type="button"
                (click)="logout()"
                class="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md"
              >
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- Mobile menu button -->
      <button
        type="button"
        (click)="toggleMobileMenu()"
        class="md:hidden inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-slate-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 dark:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200 dark:focus:ring-slate-600"
        aria-controls="navbar-user"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="w-5 h-5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 17 14"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M1 1h15M1 7h15M1 13h15"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div
    *ngIf="isMobileMenuOpen"
    class="md:hidden bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800"
  >
    <ul class="flex flex-col p-4 space-y-2">
      <button
        type="button"
        (click)="onNavClick('dashboard')"
        class="block py-2 px-3 text-slate-900 dark:text-white rounded hover:bg-slate-100 dark:hover:bg-slate-800 transition w-full text-left"
        [ngClass]="{ 'bg-indigo-100 dark:bg-slate-800': currentNav() === 'dashboard' }"
      >
        Home
      </button>
      <button
        type="button"
        (click)="onNavClick('job-tracker')"
        class="block py-2 px-3 text-slate-900 dark:text-white rounded hover:bg-slate-100 dark:hover:bg-slate-800 transition w-full text-left"
        [ngClass]="{ 'bg-indigo-100 dark:bg-slate-800': currentNav() === 'job-tracker' }"
      >
        Job Tracker
      </button>
    </ul>
  </div>
</nav>
